<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 Claim Your Gift</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* Main container */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      padding: 2rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd700, #ff6b6b, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: shimmer 3s linear infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      max-width: 300px;
      margin-bottom: 2rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff6b6b);
      border-radius: 100px;
      width: 0%;
      transition: width 0.5s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: progressShine 2s infinite;
    }

    @keyframes progressShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Gift box area */
    .gift-area {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Platform */
    .platform {
      position: absolute;
      bottom: 20px;
      width: 200px;
      height: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
      border-radius: 50%;
      filter: blur(5px);
    }

    /* The gift box - real 3D-looking gift */
    .gift-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
    }

    .gift-wrapper:hover {
      transform: scale(1.05);
    }

    .gift-wrapper:active {
      transform: scale(0.98);
    }

    /* Box shadow */
    .gift-shadow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.4), transparent);
      transition: all 0.5s ease;
    }

    .gift-wrapper.opened .gift-shadow {
      opacity: 0.5;
      transform: translateX(-50%) scale(1.5);
    }

    /* The box body */
    .box {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      height: 100px;
      perspective: 500px;
    }

    .box-front {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      border-radius: 8px;
      box-shadow: 
        inset -5px 0 0 rgba(0,0,0,0.1),
        inset 0 -5px 0 rgba(0,0,0,0.2),
        0 10px 30px rgba(231, 76, 60, 0.3);
    }

    /* Ribbon on box */
    .box-ribbon-v {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, #f1c40f, #f39c12);
      box-shadow: inset -2px 0 0 rgba(0,0,0,0.1);
    }

    .box-ribbon-h {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: 20px;
      background: linear-gradient(180deg, #f39c12, #f1c40f);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
    }

    /* Lid */
    .lid {
      position: absolute;
      top: 0;
      left: -5px;
      right: -5px;
      height: 35px;
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      border-radius: 8px 8px 4px 4px;
      transform-origin: bottom center;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        inset -3px 2px 0 rgba(0,0,0,0.1),
        0 -2px 10px rgba(0,0,0,0.2);
    }

    /* Ribbon on lid */
    .lid-ribbon {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, #f1c40f, #f39c12);
    }

    /* Bow */
    .bow {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 60px;
    }

    .bow-left {
      position: absolute;
      left: 0;
      top: 20px;
      width: 50px;
      height: 40px;
      background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
      border-radius: 50% 80% 50% 30%;
      transform: rotate(-20deg);
      box-shadow: 
        inset 5px 5px 10px rgba(255,255,255,0.3),
        inset -3px -3px 10px rgba(0,0,0,0.1);
      transition: all 0.5s ease;
    }

    .bow-right {
      position: absolute;
      right: 0;
      top: 20px;
      width: 50px;
      height: 40px;
      background: linear-gradient(225deg, #f1c40f 0%, #f39c12 100%);
      border-radius: 50% 80% 50% 30%;
      transform: rotate(20deg);
      box-shadow: 
        inset -5px 5px 10px rgba(255,255,255,0.3),
        inset 3px -3px 10px rgba(0,0,0,0.1);
      transition: all 0.5s ease;
    }

    .bow-center {
      position: absolute;
      left: 50%;
      top: 30px;
      transform: translateX(-50%);
      width: 25px;
      height: 20px;
      background: linear-gradient(180deg, #f39c12, #d4a806);
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Opened states */
    .gift-wrapper.opened .lid {
      transform: rotateX(-110deg) translateY(-20px);
    }

    .gift-wrapper.opened .bow-left {
      transform: rotate(-45deg) translateY(-30px) translateX(-10px);
      opacity: 0;
    }

    .gift-wrapper.opened .bow-right {
      transform: rotate(45deg) translateY(-30px) translateX(10px);
      opacity: 0;
    }

    /* Content reveal */
    .gift-content {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      font-size: 4rem;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
    }

    .gift-wrapper.opened .gift-content {
      transform: translateX(-50%) scale(1);
      animation: bounce 0.5s ease 0.5s;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.2); }
    }

    /* Glow effect when opened */
    .gift-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.4), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .gift-wrapper.opened .gift-glow {
      opacity: 1;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* Click instruction */
    .instruction {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .click-btn {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }

    .click-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
    }

    .click-btn:active {
      transform: translateY(0);
    }

    .click-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hint {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Particles */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: particleFly 1s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* Screen shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-1deg); }
      75% { transform: translateX(5px) rotate(1deg); }
    }

    .shake {
      animation: shake 0.3s ease;
    }

    /* Success overlay */
    .success-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .success-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .success-content {
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-overlay.show .success-content {
      transform: scale(1);
    }

    .success-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: iconBounce 0.6s ease;
    }

    @keyframes iconBounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .success-text {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .success-sub {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .close-btn {
      margin-top: 2rem;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 15, 26, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .loading-box {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .loading-box-icon {
      font-size: 3rem;
      animation: loadingBounce 1s ease infinite;
    }

    @keyframes loadingBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .loading-text {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .loading-progress {
      width: 150px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      animation: loadingProgress 2s ease-in-out infinite;
    }

    @keyframes loadingProgress {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Background stars -->
  <div class="stars" id="stars"></div>

  <div class="game-container" id="gameContainer">
    <!-- Header -->
    <div class="header">
      <h1 class="title">🎁 CLAIM YOUR GIFT</h1>
      <p class="subtitle">Complete the challenge to unlock your reward</p>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress-label">
        <span>Mission Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Gift area -->
    <div class="gift-area">
      <div class="platform"></div>
      
      <div class="gift-wrapper" id="giftWrapper" onclick="handleGiftClick()">
        <div class="gift-glow"></div>
        
        <!-- Bow -->
        <div class="bow">
          <div class="bow-left"></div>
          <div class="bow-right"></div>
          <div class="bow-center"></div>
        </div>
        
        <!-- Lid -->
        <div class="lid">
          <div class="lid-ribbon"></div>
        </div>
        
        <!-- Box body -->
        <div class="box">
          <div class="box-front"></div>
          <div class="box-ribbon-v"></div>
          <div class="box-ribbon-h"></div>
        </div>
        
        <!-- Content reveal -->
        <div class="gift-content">✨</div>
        
        <!-- Shadow -->
        <div class="gift-shadow"></div>
      </div>
      
      <div class="particles" id="particles"></div>
    </div>

    <!-- Instruction -->
    <div class="instruction">
      <button class="click-btn" id="actionBtn" onclick="handleGiftClick()">
        🎁 Open Gift
      </button>
      <p class="hint" id="hint">Tap to reveal your surprise</p>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">🎉</div>
      <h2 class="success-text">Mission Complete!</h2>
      <p class="success-sub">Your location has been captured</p>
      <button class="close-btn" onclick="closeSuccess()">Continue</button>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-box-icon">📍</div>
    </div>
    <p class="loading-text">Capturing location...</p>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
  </div>

  <script>
    // Configuration
    const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let gameState = 'idle'; // idle, opening, loading, complete, error

    // Create stars
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.opacity = Math.random() * 0.5 + 0.3;
        container.appendChild(star);
      }
    }
    createStars();

    function updateProgress(percent) {
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
    }

    function handleGiftClick() {
      if (gameState !== 'idle') return;
      
      gameState = 'opening';
      
      const wrapper = document.getElementById('giftWrapper');
      const container = document.getElementById('gameContainer');
      
      // Shake effect
      container.classList.add('shake');
      setTimeout(() => container.classList.remove('shake'), 300);
      
      // Open gift
      wrapper.classList.add('opened');
      
      // Spawn particles
      spawnParticles();
      
      // Update progress
      updateProgress(30);
      
      // Start location request after animation
      setTimeout(() => {
        updateProgress(60);
        requestLocation();
      }, 600);
    }

    function spawnParticles() {
      const container = document.getElementById('particles');
      const colors = ['#ffd700', '#ff6b6b', '#c084fc', '#667eea', '#34d399'];
      
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = '50%';
        particle.style.top = '50%';
        
        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 120;
        const tx = Math.cos(angle) * distance + 'px';
        const ty = Math.sin(angle) * distance - 50 + 'px';
        
        particle.style.setProperty('--tx', tx);
        particle.style.setProperty('--ty', ty);
        particle.style.animationDelay = Math.random() * 0.3 + 's';
        
        container.appendChild(particle);
        
        setTimeout(() => particle.remove(), 1500);
      }
    }

    function requestLocation() {
      gameState = 'loading';
      updateProgress(80);
      
      if (!navigator.geolocation) {
        showError('Geolocation not supported');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          await saveLocation(position);
        },
        (error) => {
          let message = 'Location access denied';
          switch (error.code) {
            case error.PERMISSION_DENIED:
              message = 'Please enable location access';
              break;
            case error.POSITION_UNAVAILABLE:
              message = 'Location unavailable';
              break;
            case error.TIMEOUT:
              message = 'Request timed out';
              break;
          }
          showError(message);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    async function saveLocation(position) {
      const { latitude, longitude, accuracy } = position.coords;

      const deviceInfo = {
        platform: navigator.platform,
        language: navigator.language
      };

      let ipAddress = 'unknown';
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        ipAddress = data.ip;
      } catch (e) {}

      const { error } = await supabase
        .from('locations')
        .insert({
          latitude,
          longitude,
          accuracy,
          ip_address: ipAddress,
          user_agent: navigator.userAgent,
          device_info: deviceInfo
        });

      updateProgress(100);
      
      if (error) {
        showError('Failed to save location');
      } else {
        showSuccess();
      }
    }

    function showError(message) {
      gameState = 'error';
      updateProgress(0);
      
      const hint = document.getElementById('hint');
      hint.textContent = message;
      hint.style.color = '#ff6b6b';
      
      // Reset after delay
      setTimeout(() => {
        document.getElementById('giftWrapper').classList.remove('opened');
        document.getElementById('actionBtn').disabled = false;
        hint.textContent = 'Tap to try again';
        hint.style.color = 'rgba(255, 255, 255, 0.4)';
        gameState = 'idle';
      }, 3000);
    }

    function showSuccess() {
      gameState = 'complete';
      document.getElementById('loadingOverlay').classList.remove('show');
      document.getElementById('successOverlay').classList.add('show');
      
      // More particles for celebration
      for (let i = 0; i < 5; i++) {
        setTimeout(() => spawnParticles(), i * 200);
      }
    }

    function closeSuccess() {
      document.getElementById('successOverlay').classList.remove('show');
    }
  </script>
</body>
</html>
